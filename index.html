<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeSupply</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .sidebar {
      width: 230px;
      min-height: 100vh;
      background: #fff;
      border-right: 1px solid #e3e8ef;
    }

    .nav-link {
      color: #6b7280;
      border-radius: 8px;
      margin: 2px 8px;
      padding: 9px 14px;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #eef2ff;
      color: #3b5bdb;
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #e3e8ef;
      padding: 14px 24px;
    }

    .risk-high {
      background: #fee2e2;
      color: #b91c1c;
    }

    .risk-med {
      background: #fef3c7;
      color: #b45309;
    }

    .risk-low {
      background: #dcfce7;
      color: #166534;
    }

    .s-pending {
      background: #fef3c7;
      color: #b45309;
    }

    .s-review {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .s-resolved {
      background: #dcfce7;
      color: #166534;
    }

    .s-rejected {
      background: #fee2e2;
      color: #b91c1c;
    }

    .priority-bar {
      width: 4px;
      border-radius: 4px;
    }

    .p-high {
      background: #ef4444;
    }

    .p-med {
      background: #f59e0b;
    }

    .p-low {
      background: #22c55e;
    }

    .heatmap-cell {
      border-radius: 8px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
    }

    .hm-1 {
      background: #dcfce7;
      color: #166534;
    }

    .hm-2 {
      background: #fef3c7;
      color: #b45309;
    }

    .hm-3 {
      background: #fee2e2;
      color: #b91c1c;
    }

    .cert-card {
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      padding: 12px;
    }

    .tl-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .tl-line {
      width: 1px;
      background: #e3e8ef;
      flex: 1;
      margin: 4px 0;
    }

    .msg-bubble-out {
      background: #3b5bdb;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      max-width: 75%;
    }

    .msg-bubble-in {
      background: #f1f3f9;
      color: #1a1a2e;
      border: 1px solid #e3e8ef;
      border-radius: 12px;
      padding: 10px 14px;
      max-width: 75%;
    }

    .template-chip {
      border: 1px solid #e3e8ef;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #6b7280;
      background: #f9fafb;
      transition: all .15s;
    }

    .template-chip:hover {
      border-color: #3b5bdb;
      color: #3b5bdb;
      background: #eef2ff;
    }

    .stat-card {
      background: #f9fafb;
      border-radius: 10px;
      padding: 14px 18px;
    }

    .query-row {
      cursor: pointer;
      border-bottom: 1px solid #f1f3f9;
    }

    .query-row:hover {
      background: #f9fafb;
    }

    .query-row:last-child {
      border-bottom: none;
    }

    .filter-chip {
      border: 1px solid #e3e8ef;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #6b7280;
      background: #fff;
    }

    .filter-chip.active {
      background: #3b5bdb;
      color: #fff;
      border-color: #3b5bdb;
    }

    .attach-icon {
      width: 32px;
      height: 32px;
      background: #dbeafe;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #1d4ed8;
      font-weight: 600;
      flex-shrink: 0;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    input,
    select,
    textarea {
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #3b5bdb !important;
      box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.1) !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>

</html>
